<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — AI Coder</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #f5f4f0;
            --surface:  #ffffff;
            --border:   #e0ded8;
            --ink:      #1a1a1a;
            --ink2:     #888880;
            --accent:   #2563eb;
            --accent-l: #eff4ff;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: 'IBM Plex Sans', sans-serif;
        }

        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.4} }
        @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        .topbar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px; background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 8px; }

        .brand-mark {
            width: 28px; height: 28px; border-radius: 6px;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }

        .brand-name {
            font-size: 0.95rem; font-weight: 600;
            color: var(--ink); letter-spacing: -0.01em;
        }

        .brand-tag {
            font-size: 0.65rem; color: var(--ink2);
            font-family: 'IBM Plex Mono', monospace;
            background: var(--border); padding: 2px 7px; border-radius: 4px;
        }

        .topbar-right {
            margin-left: auto; display: flex; align-items: center; gap: 6px;
            font-size: 0.7rem; color: var(--ink2);
            font-family: 'IBM Plex Mono', monospace;
        }

        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #22c55e; animation: pulse 2s infinite;
        }

        .page {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 80px 16px 40px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 52px 44px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,0.05);
            animation: fadeUp 0.4s ease both;
        }

        .icon-wrap {
            width: 68px; height: 68px;
            background: var(--accent);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; margin: 0 auto 24px;
            animation: float 3s ease-in-out infinite;
        }

        .badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent-l); border: 1px solid #bfdbfe;
            padding: 3px 12px; border-radius: 20px;
            font-size: 0.68rem; color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.9rem; font-weight: 700;
            color: var(--ink); letter-spacing: -0.03em;
            line-height: 1.2; margin-bottom: 12px;
        }

        h1 span { color: var(--accent); }

        .cursor {
            display: inline-block; width: 2px; height: 0.9em;
            background: var(--accent); vertical-align: middle;
            margin-left: 2px; animation: blink 1s infinite;
        }

        .subtitle {
            font-size: 0.875rem; color: var(--ink2);
            line-height: 1.65; margin-bottom: 36px;
        }

        .btn {
            display: flex; align-items: center;
            justify-content: center; gap: 8px;
            background: var(--accent); color: #fff;
            padding: 13px 28px; border-radius: 8px;
            font-size: 0.9rem; font-weight: 600;
            text-decoration: none; width: 100%;
            transition: opacity 0.15s, transform 0.15s;
            font-family: 'IBM Plex Sans', sans-serif;
        }

        .btn:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-arrow { transition: transform 0.2s; }
        .btn:hover .btn-arrow { transform: translateX(4px); }

        .footer {
            margin-top: 18px;
            font-size: 0.65rem; color: var(--ink2);
            font-family: 'IBM Plex Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand">
            <div class="brand-mark">🤖</div>
            <span class="brand-name">AI Coder</span>
            <span class="brand-tag">ollama · local</span>
        </div>
        <div class="topbar-right">
            <div class="dot"></div>
            running
        </div>
    </div>

    <div class="page">
        <div class="card">

            <div class="icon-wrap">🤖</div>

            <div class="badge">
                <div class="dot"></div>
                ollama · local
            </div>

            <h1>Welcome to <span>AI</span> Coder<span class="cursor"></span></h1>

            <p class="subtitle">
                Your local AI coding assistant powered by Ollama.<br>
                Ask anything — code, debug, explain, or review.
            </p>

            <a href="/chat-page" class="btn">
                Start Chatting
                <span class="btn-arrow">→</span>
            </a>

            <div class="footer">
                Powered by Ollama · Running locally
            </div>

        </div>
    </div>

</body>
</html>
